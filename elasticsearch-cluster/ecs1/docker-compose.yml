version: '3.8'

# =============================================
# ECS-1 (172.16.0.20)
# es-node1: 纯 Master 节点
# es-node2: 纯 Data 节点
# =============================================

services:

  # --------------------------------------------
  # ES Node-1: 纯 Master 节点
  # --------------------------------------------
  es-node1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: es-node1
    environment:
      - node.name=es-node1
      - cluster.name=es-cluster
      - node.roles=master
      - network.host=0.0.0.0
      - network.publish_host=172.16.0.20
      - http.port=9200
      - transport.port=9300
      - discovery.seed_hosts=172.16.0.20:9300,172.16.0.20:9301,172.16.0.21:9300
      - cluster.initial_master_nodes=es-node1,es-node3
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/es-node1/es-node1.crt
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/es-node1/es-node1.key
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/es-node1/es-node1.crt
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/es-node1/es-node1.key
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - /data/elasticsearch/node1/data:/usr/share/elasticsearch/data
      - /data/elasticsearch/node1/logs:/usr/share/elasticsearch/logs
      - /data/elasticsearch/certs:/usr/share/elasticsearch/config/certs:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - es-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert /usr/share/elasticsearch/config/certs/ca/ca.crt https://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --------------------------------------------
  # ES Node-2: 纯 Data 节点
  # --------------------------------------------
  es-node2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: es-node2
    environment:
      - node.name=es-node2
      - cluster.name=es-cluster
      - node.roles=data,ingest
      - network.host=0.0.0.0
      - network.publish_host=172.16.0.20
      - http.port=9201
      - transport.port=9301
      - discovery.seed_hosts=172.16.0.20:9300,172.16.0.20:9301,172.16.0.21:9300
      - cluster.initial_master_nodes=es-node1,es-node3
      - ES_JAVA_OPTS=-Xms5g -Xmx5g
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/es-node2/es-node2.crt
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/es-node2/es-node2.key
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/es-node2/es-node2.crt
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/es-node2/es-node2.key
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - /data/elasticsearch/node2/data:/usr/share/elasticsearch/data
      - /data/elasticsearch/node2/logs:/usr/share/elasticsearch/logs
      - /data/elasticsearch/certs:/usr/share/elasticsearch/config/certs:ro
    ports:
      - "9201:9201"
      - "9301:9301"
    networks:
      - es-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert /usr/share/elasticsearch/config/certs/ca/ca.crt https://localhost:9201/_cluster/health | grep -qE 'green|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  es-network:
    driver: bridge
