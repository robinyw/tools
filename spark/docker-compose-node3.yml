version: '3.8'

services:

  zookeeper:
    image: zookeeper:3.8.4
    container_name: zookeeper
    network_mode: host
    restart: unless-stopped
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=spark-master:2888:3888 server.2=spark-worker1:2888:3888 server.3=hadoop-node3:2888:3888
      ZOO_4LW_COMMANDS_WHITELIST: "*"
    volumes:
      - /opt/bigdata/data/zookeeper:/data
      - /opt/bigdata/logs/zookeeper:/logs
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  journalnode:
    image: apache/hadoop:3.3.6
    container_name: journalnode
    network_mode: host
    restart: unless-stopped
    volumes:
      - /opt/bigdata/config/hadoop:/opt/hadoop/etc/hadoop
      - /opt/bigdata/data/journalnode:/opt/hadoop/data/journalnode
      - /opt/bigdata/logs/hadoop:/opt/hadoop/logs
    command: hdfs journalnode
    depends_on:
      zookeeper:
        condition: service_healthy

  namenode-standby:
    image: apache/hadoop:3.3.6
    container_name: namenode-standby
    network_mode: host
    restart: unless-stopped
    volumes:
      - /opt/bigdata/config/hadoop:/opt/hadoop/etc/hadoop
      - /opt/bigdata/data/namenode:/opt/hadoop/data/namenode
      - /opt/bigdata/logs/hadoop:/opt/hadoop/logs
    command: hdfs namenode
    depends_on:
      - journalnode

  zkfc:
    image: apache/hadoop:3.3.6
    container_name: zkfc
    network_mode: host
    restart: unless-stopped
    volumes:
      - /opt/bigdata/config/hadoop:/opt/hadoop/etc/hadoop
      - /opt/bigdata/logs/hadoop:/opt/hadoop/logs
    command: hdfs zkfc
    depends_on:
      - namenode-standby

  resourcemanager-standby:
    image: apache/hadoop:3.3.6
    container_name: resourcemanager-standby
    network_mode: host
    restart: unless-stopped
    environment:
      YARN_RESOURCEMANAGER_OPTS: "-Xmx4g"
    volumes:
      - /opt/bigdata/config/hadoop:/opt/hadoop/etc/hadoop
      - /opt/bigdata/logs/hadoop:/opt/hadoop/logs
    command: yarn resourcemanager
    depends_on:
      - namenode-standby

  datanode:
    image: apache/hadoop:3.3.6
    container_name: datanode
    network_mode: host
    restart: unless-stopped
    volumes:
      - /opt/bigdata/config/hadoop:/opt/hadoop/etc/hadoop
      - /opt/bigdata/data/datanode:/opt/hadoop/data/datanode
      - /opt/bigdata/logs/hadoop:/opt/hadoop/logs
    command: hdfs datanode
    depends_on:
      - journalnode

  nodemanager:
    image: apache/hadoop:3.3.6
    container_name: nodemanager
    network_mode: host
    restart: unless-stopped
    environment:
      YARN_NODEMANAGER_OPTS: "-Xmx2g"
    volumes:
      - /opt/bigdata/config/hadoop:/opt/hadoop/etc/hadoop
      - /opt/bigdata/logs/hadoop:/opt/hadoop/logs
    command: yarn nodemanager
    depends_on:
      - datanode
